# Doom over AT Protocol -- Docker Compose
#
# Two services:
# - doom-server: runs the Doom engine, reads inputs, writes frames
# - doom-client: serves browser UI, handles OAuth, writes inputs, reads frames

services:
  doom-server:
    build: .
    command: ["pnpm", "--filter", "@singi-labs/doom-server", "dev"]
    restart: unless-stopped
    environment:
      - ATP_SERVICE=${ATP_SERVICE:-https://bsky.social}
      - ATP_IDENTIFIER=${ATP_IDENTIFIER}
      - ATP_PASSWORD=${ATP_PASSWORD}
      - WAD_PATH=/app/doom1.wad
      - DEBUG_PORT=8666
    volumes:
      - ./doom1.wad:/app/doom1.wad:ro
    networks:
      - barazo_frontend
      - doom_internal
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  doom-client:
    build: .
    command: ["pnpm", "--filter", "@singi-labs/doom-client", "dev"]
    restart: unless-stopped
    environment:
      - PUBLIC_URL=${PUBLIC_URL:-https://doom.singi.dev}
      - SERVER_DID=${SERVER_DID}
      - CLIENT_PORT=8667
    networks:
      - barazo_frontend
      - doom_internal
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  barazo_frontend:
    external: true
  doom_internal:
